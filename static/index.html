<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GateKeeper | API Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #050a0e;
            color: #00ff88;
            min-height: 100vh;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px #00ff88;
        }

        .badge {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 32px 40px;
        }

        .card {
            background: rgba(0, 255, 136, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }

        .card:hover { border-color: rgba(0, 255, 136, 0.5); }

        .card label {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: rgba(0, 255, 136, 0.5);
            text-transform: uppercase;
        }

        .card .value {
            font-size: 3rem;
            font-weight: bold;
            margin-top: 8px;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transition: all 0.3s;
        }

        .card .value.blocked { color: #ff4466; text-shadow: 0 0 30px rgba(255, 68, 102, 0.6); }
        .card .value.allowed { color: #00ddff; text-shadow: 0 0 30px rgba(0, 221, 255, 0.6); }

        .charts {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 0 40px 40px;
        }

        .chart-card {
            background: rgba(0, 255, 136, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 12px;
            padding: 24px;
        }

        .chart-card h3 {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: rgba(0, 255, 136, 0.6);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        canvas { max-width: 100%; }

        .footer {
            text-align: center;
            padding: 16px;
            color: rgba(0, 255, 136, 0.3);
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <header>
        <h1>⬡ GateKeeper</h1>
        <span class="badge">● LIVE</span>
    </header>

    <div class="grid">
        <div class="card">
            <label>Total Requests</label>
            <div class="value" id="hits">—</div>
        </div>
        <div class="card">
            <label>Blocked (429)</label>
            <div class="value blocked" id="blocks">—</div>
        </div>
        <div class="card">
            <label>Allowed</label>
            <div class="value allowed" id="allowed">—</div>
        </div>
    </div>

    <div class="charts">
        <div class="chart-card">
            <h3>Traffic Over Time</h3>
            <canvas id="lineChart" height="120"></canvas>
        </div>
        <div class="chart-card">
            <h3>Request Split</h3>
            <canvas id="pieChart" height="120"></canvas>
        </div>
    </div>

    <div class="footer">AUTO-REFRESH: 5s · GATEKEEPER API MONITOR</div>

    <script>
        const MAX_POINTS = 20;
        const labels = [];
        const hitsHistory = [];
        const blocksHistory = [];

        const lineCtx = document.getElementById('lineChart').getContext('2d');
        const lineChart = new Chart(lineCtx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Total Hits',
                        data: hitsHistory,
                        borderColor: '#00ff88',
                        backgroundColor: 'rgba(0,255,136,0.05)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                    },
                    {
                        label: 'Blocked',
                        data: blocksHistory,
                        borderColor: '#ff4466',
                        backgroundColor: 'rgba(255,68,102,0.05)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                    }
                ]
            },
            options: {
                responsive: true,
                animation: { duration: 400 },
                scales: {
                    x: { ticks: { color: 'rgba(0,255,136,0.4)', font: { size: 10 } }, grid: { color: 'rgba(0,255,136,0.05)' } },
                    y: { ticks: { color: 'rgba(0,255,136,0.4)' }, grid: { color: 'rgba(0,255,136,0.05)' }, beginAtZero: true }
                },
                plugins: { legend: { labels: { color: 'rgba(0,255,136,0.6)', font: { size: 11 } } } }
            }
        });

        const pieCtx = document.getElementById('pieChart').getContext('2d');
        const pieChart = new Chart(pieCtx, {
            type: 'doughnut',
            data: {
                labels: ['Allowed', 'Blocked'],
                datasets: [{ data: [0, 0], backgroundColor: ['rgba(0,221,255,0.7)', 'rgba(255,68,102,0.7)'], borderColor: ['#00ddff', '#ff4466'], borderWidth: 1 }]
            },
            options: {
                responsive: true,
                animation: { duration: 400 },
                plugins: { legend: { labels: { color: 'rgba(0,255,136,0.6)' } } }
            }
        });

        async function fetchAndUpdate() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();

                document.getElementById('hits').textContent = data.total_hits;
                document.getElementById('blocks').textContent = data.total_blocks;
                document.getElementById('allowed').textContent = data.allowed;

                const now = new Date().toLocaleTimeString();
                labels.push(now);
                hitsHistory.push(data.total_hits);
                blocksHistory.push(data.total_blocks);

                if (labels.length > MAX_POINTS) {
                    labels.shift(); hitsHistory.shift(); blocksHistory.shift();
                }

                lineChart.update();
                pieChart.data.datasets[0].data = [data.allowed, data.total_blocks];
                pieChart.update();
            } catch (e) {
                console.error('Failed to fetch stats', e);
            }
        }

        fetchAndUpdate();
        setInterval(fetchAndUpdate, 5000);
    </script>
</body>
</html>
